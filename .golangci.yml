run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - goimports
    - bodyclose
    - contextcheck
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/xtra1n/local-messenger

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
