<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log in</title>
</head>
<body>
  <h1>Log in</h1>
  <form method="POST" action="/login">
    <label>
      Username:
      <input type="text" name="username" required />
    </label>
    <br />
    <label>
      Password:
      <input type="password" name="password" required />
    </label>
    <br />
    <button type="submit">Log in</button>
  </form>
  <p>No account? <a href="/signup">Sign up</a></p>
</body>
</html>
