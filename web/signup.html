<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign up</title>
</head>
<body>
  <h1>Sign up</h1>
  <form method="POST" action="/signup">
    <label>
      Username:
      <input type="text" name="username" required />
    </label>
    <br />
    <label>
      Password:
      <input type="password" name="password" required />
    </label>
    <br />
    <button type="submit">Create account</button>
  </form>
  <p>Already have an account? <a href="/login">Log in</a></p>
</body>
</html>
